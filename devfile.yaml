schemaVersion: 2.2.0
metadata:
  name: cics
attributes:
  controller.devfile.io/storage-type: ephemeral
projects:
  - git:
      checkoutFrom:
        revision: main
      remotes:
        origin: 'https://github.com/asunix/sample-cics-api.git'
    name: catalog-manager-api
components:
    - name: zosconnect
      container:
        image: 'icr.io/zosconnect/ibm-zcon-designer:3.0.82'
        mountSources: true
        sourceMapping: /projects
        endpoints:
          - attributes:
              cookiesAuthEnabled: true
            exposure: public
            name: zosconnect-ui
            path: /zosConnect/designer/
            protocol: http
            secure: true
            targetPort: 9080
        env:
          - name: ZCON_DESIGNER_PROJECT
            value: /projects/catalog-manager-api
          - name: CICS_HOST
            value: localhost
          - name: CICS_PORT
            value: '6666'
          - name: CICS_USER
            value: cicsuser
          - name: CICS_PASSWORD
            value: password
        - id: redhat/vscode-yaml/latest
          type: chePlugin
        - id: redhat/vscode-xml/latest
          type: chePlugin
